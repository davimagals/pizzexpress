<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Pizzexpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Moul&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div id="barra">
      <a href="index.html">
        <img id="seta-voltar" src="assets/img/arrow.png" />
      </a>
    </div>

    <div id="logo">
      <h2>Pizzexpress</h2>
    </div>

    <div id="formulario">
      <img id="img-usuario" src="assets/img/user.png" />

      <form action="">
        <label for="email">E-mail</label><br />
        <input id="email" type="text" /><br />

        <label for="senha">Senha</label><br />
        <input id="senha" type="text" />
      </form>

      <img id="login-g" src="assets/img/google.png" />
      <img id="login-f" src="assets/img/facebook.png" />
    </div>

    <button id="btn-entrar">ENTRAR</button>
  </body>
</html>
